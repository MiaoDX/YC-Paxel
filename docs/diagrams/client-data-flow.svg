<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="780" viewBox="0 0 1300 780" role="img" aria-labelledby="title desc">
  <title id="title">Paxel client analyzer data flow</title>
  <desc id="desc">A diagram showing host inputs, Docker mounts, the Rails client pipeline, local cache and data directories, LLM proxy calls, and final results upload.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#563d7c"/>
    </marker>
    <style>
      .bg { fill: #fcfbff; }
      .host { fill: #fff8e8; stroke: #a06b00; stroke-width: 2; rx: 8; }
      .docker { fill: #f2ecff; stroke: #563d7c; stroke-width: 2.5; rx: 10; }
      .stage { fill: #ffffff; stroke: #563d7c; stroke-width: 2; rx: 8; }
      .local { fill: #eef7ff; stroke: #2d6f9f; stroke-width: 2; rx: 8; }
      .remote { fill: #fff0f0; stroke: #a63d3d; stroke-width: 2; rx: 8; }
      .title { font: 700 24px Arial, sans-serif; fill: #2c2142; }
      .h { font: 700 16px Arial, sans-serif; fill: #2c2142; }
      .t { font: 13px Arial, sans-serif; fill: #362b4a; }
      .small { font: 12px Arial, sans-serif; fill: #5e536e; }
      .arrow { stroke: #563d7c; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .remoteArrow { stroke: #a63d3d; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .localArrow { stroke: #2d6f9f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .label { font: 12px Arial, sans-serif; fill: #563d7c; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1300" height="780"/>
  <text class="title" x="40" y="46">Paxel Client Analyzer Data Flow</text>
  <text class="t" x="40" y="72">High-level map of what the extracted Rails client is built to do when run by the hosted upload script.</text>

  <rect class="host" x="45" y="125" width="260" height="230"/>
  <text class="h" x="70" y="160">Host machine inputs</text>
  <text class="t" x="70" y="190">Claude: ~/.claude/projects</text>
  <text class="t" x="70" y="214">Codex: ~/.codex/sessions</text>
  <text class="t" x="70" y="238">Cursor workspace storage</text>
  <text class="t" x="70" y="262">opencode / Gemini sessions</text>
  <text class="t" x="70" y="286">Optional git repo mount</text>
  <text class="small" x="70" y="320">Host upload.sh prepares filters and env vars</text>

  <rect class="docker" x="390" y="100" width="560" height="575"/>
  <text class="h" x="420" y="135">Docker container: /rails client app</text>
  <text class="small" x="420" y="158">Entrypoint initializes SQLite, then runs bin/rails client:analyze</text>

  <rect class="stage" x="430" y="190" width="210" height="78"/>
  <text class="h" x="452" y="222">Discover sessions</text>
  <text class="t" x="452" y="246">TranscriptDiscoverer</text>

  <rect class="stage" x="700" y="190" width="210" height="78"/>
  <text class="h" x="722" y="222">Parse and normalize</text>
  <text class="t" x="722" y="246">Chunkers and normalizers</text>

  <rect class="stage" x="430" y="315" width="210" height="92"/>
  <text class="h" x="452" y="347">LLM summaries</text>
  <text class="t" x="452" y="371">Session narratives</text>
  <text class="t" x="452" y="391">Decision extraction</text>

  <rect class="stage" x="700" y="315" width="210" height="92"/>
  <text class="h" x="722" y="347">Deterministic linking</text>
  <text class="t" x="722" y="371">Commit groups</text>
  <text class="t" x="722" y="391">Episodes and traces</text>

  <rect class="stage" x="430" y="455" width="210" height="92"/>
  <text class="h" x="452" y="487">Local code quality</text>
  <text class="t" x="452" y="511">Reads /repo:ro</text>
  <text class="t" x="452" y="531">Deterministic metrics</text>

  <rect class="stage" x="700" y="455" width="210" height="92"/>
  <text class="h" x="722" y="487">Package results</text>
  <text class="t" x="722" y="511">Scores, summaries</text>
  <text class="t" x="722" y="531">metadata, telemetry</text>

  <rect class="local" x="430" y="585" width="210" height="55"/>
  <text class="h" x="452" y="618">/rails/cache</text>
  <text class="small" x="452" y="636">LLM result cache</text>

  <rect class="local" x="700" y="585" width="210" height="55"/>
  <text class="h" x="722" y="618">/rails/data</text>
  <text class="small" x="722" y="636">Pending upload stash</text>

  <rect class="remote" x="1035" y="210" width="245" height="110"/>
  <text class="h" x="1060" y="245">YC LLM proxy</text>
  <text class="t" x="1060" y="275">YC_LLM_PROXY_URL</text>
  <text class="small" x="1060" y="298">Summaries and scoring calls</text>

  <rect class="remote" x="1035" y="420" width="245" height="110"/>
  <text class="h" x="1060" y="455">YC results API</text>
  <text class="t" x="1060" y="485">/api/v1/results</text>
  <text class="small" x="1060" y="508">Final report payload</text>

  <path class="arrow" d="M305 240 C345 240 355 230 390 230"/>
  <text class="label" x="318" y="226">mounts</text>

  <path class="arrow" d="M640 229 L700 229"/>
  <path class="arrow" d="M805 268 C805 292 805 298 805 315"/>
  <path class="arrow" d="M700 360 L640 360"/>
  <path class="arrow" d="M535 407 C535 432 535 438 535 455"/>
  <path class="arrow" d="M640 501 L700 501"/>

  <path class="remoteArrow" d="M640 360 C770 260 900 245 1035 265"/>
  <text class="label" x="800" y="250">LLM prompts / responses</text>

  <path class="remoteArrow" d="M910 501 C950 501 990 492 1035 480"/>
  <text class="label" x="932" y="467">upload JSON</text>

  <path class="localArrow" d="M535 315 C500 410 500 520 535 585"/>
  <text class="label" x="458" y="560">cache</text>

  <path class="localArrow" d="M805 547 C805 565 805 572 805 585"/>
  <text class="label" x="812" y="570">stash on failure</text>
</svg>

